<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El álbum de Lucca</title>
<style>
  :root{
    --celeste:#74ACDF;
    --celeste-claro:#EAF3FC;
    --azul-oscuro:#0B3D7A;
    --papel:#FBF7EE;
    --papel-borde:#E4DCC8;
    --dorado:#D4A24E;
    --rojo:#D8453A;
    --verde:#3FA34D;
    --texto:#222222;
    --texto-suave:#5B5B5B;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    font-family:'Archivo Black','Arial Black',sans-serif;
    background:var(--papel);
    color:var(--texto);
  }

  .album{
    max-width:640px;
    margin:0 auto;
    min-height:100vh;
    background:repeating-linear-gradient(
      90deg,
      var(--papel) 0px, var(--papel) 38px,
      var(--celeste) 38px, var(--celeste) 76px
    );
    padding:0 0 60px;
    position:relative;
  }

  /* ---------- PORTADA ---------- */
  .portada{
    background:linear-gradient(180deg, var(--celeste) 0%, var(--celeste) 55%, var(--papel) 55%);
    padding:32px 24px 40px;
    text-align:center;
    position:relative;
    overflow:hidden;
  }

  .portada::before{
    content:"";
    position:absolute;
    top:0; left:0; right:0; height:8px;
    background:repeating-linear-gradient(90deg, var(--papel) 0 10px, var(--celeste) 10px 20px);
  }

  .sello{
    display:inline-block;
    background:var(--dorado);
    color:#fff;
    font-size:11px;
    letter-spacing:2px;
    padding:6px 14px;
    border-radius:999px;
    margin-bottom:18px;
    text-transform:uppercase;
    font-family:Arial, sans-serif;
    font-weight:700;
  }

  .titulo-album{
    font-size:13px;
    letter-spacing:6px;
    color:#fff;
    text-transform:uppercase;
    margin:0;
    font-family:Arial, sans-serif;
    font-weight:700;
    opacity:0.85;
  }

  .nombre-jugador{
    font-size:54px;
    line-height:1.05;
    color:#fff;
    margin:10px 0 4px;
    text-shadow:3px 3px 0 var(--azul-oscuro);
    letter-spacing:2px;
  }

  .dorsal{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:90px;
    height:90px;
    border-radius:50%;
    background:#fff;
    color:var(--azul-oscuro);
    font-size:48px;
    border:6px solid var(--dorado);
    margin:18px auto 0;
    box-shadow:inset 0 0 0 3px rgba(116,172,223,0.25);
  }

  .subtitulo-portada{
    margin:18px auto 0;
    max-width:380px;
    font-family:Arial, sans-serif;
    font-weight:400;
    font-size:15px;
    line-height:1.6;
    color:var(--azul-oscuro);
    background:rgba(255,255,255,0.65);
    padding:14px 18px;
    border-radius:12px;
    border:2px solid var(--celeste);
  }

  /* ---------- INSTRUCCION ---------- */
  .contenido{
    background:var(--papel);
    margin:0 10px;
    border-radius:18px;
    box-shadow:0 -4px 0 rgba(255,255,255,0.4) inset;
    padding-bottom:4px;
  }

  .instruccion{
    text-align:center;
    font-family:Arial, sans-serif;
    font-weight:400;
    font-size:13px;
    color:var(--texto-suave);
    padding:18px 24px 4px;
    line-height:1.6;
  }

  /* ---------- GRILLA DE FIGURITAS ---------- */
  .grilla{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:14px;
    padding:18px;
  }

  @media (max-width:420px){
    .grilla{grid-template-columns:repeat(2, 1fr);}
  }

  @keyframes brilloBorde{
    0%, 100%{ box-shadow:0 0 0 3px rgba(116,172,223,0.3), 0 0 8px rgba(116,172,223,0.4); border-color:var(--celeste); }
    50%{ box-shadow:0 0 0 5px rgba(116,172,223,0.65), 0 0 18px rgba(116,172,223,0.9); border-color:#A9CCF0; }
  }

  .figurita{
    aspect-ratio:3/4;
    background:var(--celeste-claro);
    border:3px solid var(--celeste);
    border-radius:10px;
    position:relative;
    cursor:pointer;
    overflow:hidden;
    transition:transform 0.15s ease, box-shadow 0.15s ease;
    animation:brilloBorde 1.8s ease-in-out infinite;
  }

  .figurita.no-brillo{
    animation:none;
    box-shadow:none;
  }

  .figurita.final.no-brillo{
    animation:none;
    box-shadow:none;
    border-color:var(--dorado);
  }

  .figurita:hover{
    transform:translateY(-3px);
    box-shadow:0 6px 0 rgba(11,61,122,0.15);
  }

  .figurita .fondo-foto{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
  }

  .figurita .numero-fondo{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:34px;
    color:var(--celeste);
    line-height:1;
  }

  .figurita .degradado{
    position:absolute;
    left:0; right:0; bottom:0;
    height:48%;
    background:linear-gradient(180deg, transparent 0%, rgba(11,61,122,0.78) 100%);
    pointer-events:none;
  }

  .figurita .pie-figurita{
    position:absolute;
    left:8px; right:8px; bottom:6px;
    display:flex;
    justify-content:flex-start;
    align-items:baseline;
  }

  .figurita .pie-edad{
    font-family:Arial, sans-serif;
    font-weight:700;
    font-size:11px;
    letter-spacing:1px;
    color:#fff;
    text-transform:uppercase;
    text-shadow:1px 1px 0 rgba(11,61,122,0.6);
  }

  .figurita.placeholder .pie-edad{
    color:var(--texto-suave);
    text-shadow:none;
  }

  .figurita .estrellita{
    position:absolute;
    top:6px;
    right:8px;
    font-size:14px;
    color:var(--dorado);
    z-index:2;
  }

  @keyframes brilloBordeFinal{
    0%, 100%{ box-shadow:0 0 0 4px rgba(212,162,78,0.35), 0 0 12px rgba(212,162,78,0.45); border-color:var(--dorado); }
    50%{ box-shadow:0 0 0 6px rgba(212,162,78,0.7), 0 0 28px rgba(212,162,78,1); border-color:#F4D9A8; }
  }

  @keyframes flotarGlobo1{0%,100%{transform:translateY(0) rotate(-8deg)}50%{transform:translateY(-10px) rotate(-2deg)}}
  @keyframes flotarGlobo2{0%,100%{transform:translateY(0) rotate(8deg)}50%{transform:translateY(-12px) rotate(14deg)}}
  @keyframes flotarGlobo3{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-9px) rotate(8deg)}}
  @keyframes flotarGlobo4{0%,100%{transform:translateY(0) rotate(5deg)}50%{transform:translateY(-11px) rotate(-6deg)}}
  @keyframes girarPelota1{0%{transform:rotate(0deg) translateX(0)}50%{transform:rotate(180deg) translateX(4px)}100%{transform:rotate(360deg) translateX(0)}}
  @keyframes girarPelota2{0%{transform:rotate(0deg) translateX(0)}50%{transform:rotate(-180deg) translateX(-4px)}100%{transform:rotate(-360deg) translateX(0)}}
  @keyframes volarAvion{
    0%{ left:-20px; top:55%; transform:rotate(-8deg); }
    45%{ left:65%; top:38%; transform:rotate(-4deg); }
    50%{ left:75%; top:38%; transform:rotate(176deg); }
    95%{ left:-10px; top:62%; transform:rotate(180deg); }
    100%{ left:-20px; top:55%; transform:rotate(-8deg); }
  }

  .figurita.final{
    border-width:5px;
    border-color:var(--dorado);
    background:var(--azul-oscuro);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    animation:brilloBordeFinal 1.8s ease-in-out infinite;
  }

  .figurita.final .numero-final{
    font-size:54px;
    color:#fff;
    line-height:1;
    margin:0;
  }

  .figurita.final .pie-edad{
    position:static;
    color:var(--celeste-claro);
    text-shadow:none;
  }

  .figurita.final .deco{
    position:absolute;
    font-size:17px;
    pointer-events:none;
  }

  .figurita.final .globo1{ top:6px; left:4px; font-size:18px; animation:flotarGlobo1 2.1s ease-in-out infinite; }
  .figurita.final .globo2{ top:4px; right:6px; font-size:18px; animation:flotarGlobo2 1.8s ease-in-out infinite; }
  .figurita.final .globo3{ top:12px; left:38%; font-size:14px; animation:flotarGlobo3 2.4s ease-in-out infinite; }
  .figurita.final .globo4{ top:2px; right:34%; font-size:14px; animation:flotarGlobo4 2.0s ease-in-out infinite; }
  .figurita.final .pelota1{ bottom:28px; left:6px; font-size:16px; animation:girarPelota1 2.4s linear infinite; }
  .figurita.final .pelota2{ bottom:32px; right:6px; font-size:13px; animation:girarPelota2 2.9s linear infinite; }
  .figurita.final .pelota3{ bottom:12px; left:36%; font-size:12px; animation:girarPelota1 3.2s linear infinite; }
  .figurita.final .pelota4{ bottom:14px; right:30%; font-size:14px; animation:girarPelota2 2.6s linear infinite; }
  .figurita.final .avion{ font-size:16px; animation:volarAvion 5s linear infinite; }

  /* ---------- PESTAÑA / DETALLE ---------- */
  .overlay{
    position:fixed;
    inset:0;
    background:rgba(11,61,122,0.55);
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:50;
  }

  .overlay.activo{display:flex;}

  .ficha{
    background:var(--papel);
    border-radius:16px;
    max-width:380px;
    width:100%;
    max-height:88vh;
    overflow-y:auto;
    padding:0;
    border:4px solid var(--celeste);
    position:relative;
  }

  .cerrar{
    width:32px;
    height:32px;
    border-radius:50%;
    background:#fff;
    border:none;
    font-size:18px;
    color:var(--azul-oscuro);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:Arial, sans-serif;
    font-weight:700;
  }

  .cerrar-flotante{
    position:absolute;
    top:10px;
    right:10px;
    z-index:5;
    box-shadow:0 2px 6px rgba(0,0,0,0.25);
  }

  .ficha-cuerpo{
    padding:18px;
  }

  .ficha-cuerpo-video{
    padding:0;
  }

  .marco-foto{
    width:100%;
    aspect-ratio:9/16;
    max-height:80vh;
    background:#000;
    border-radius:12px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-family:Arial, sans-serif;
    color:var(--texto-suave);
    font-size:13px;
    text-align:center;
    padding:10px;
    overflow:hidden;
  }

  .marco-foto img, .marco-foto video{
    width:100%;
    height:100%;
    object-fit:contain;
    border-radius:8px;
    background:#000;
  }

  .marco-foto .icono-camara{
    font-size:26px;
    margin-bottom:6px;
  }

  /* ---------- FICHA FINAL ---------- */
  .video-final{
    width:100%;
    aspect-ratio:9/16;
    max-height:80vh;
    background:#000;
    border-radius:12px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-family:Arial, sans-serif;
    color:var(--texto-suave);
    font-size:13px;
    text-align:center;
    padding:10px;
    overflow:hidden;
  }

  .video-final video{
    width:100%;
    height:100%;
    object-fit:contain;
    border-radius:8px;
    background:#000;
  }

  .mensaje-final{
    text-align:center;
    font-size:22px;
    color:var(--dorado);
    margin:0;
    padding:14px;
    text-shadow:2px 2px 0 rgba(212,162,78,0.2);
  }

  /* ---------- PIE ---------- */
  .pie{
    text-align:center;
    padding:24px 24px 0;
  }

  .pie .te-amo{
    display:block;
    font-family:'Archivo Black','Arial Black',sans-serif;
    font-size:30px;
    color:var(--azul-oscuro);
    line-height:1.3;
    text-shadow:2px 2px 0 var(--celeste);
  }

  .pie .firma{
    display:block;
    font-family:Arial, sans-serif;
    font-size:16px;
    color:var(--texto-suave);
    margin-top:6px;
  }
</style>
</head>
<body>

<div class="album">

  <div class="portada">
    <span class="sello">Edición especial</span>
    <p class="titulo-album">Álbum de</p>
    <h1 class="nombre-jugador">LUCCA</h1>
    <div class="dorsal">8</div>
    <p class="subtitulo-portada">
      Tocá cada figurita para descubrir un video. ¡Feliz cumpleaños, mi campeón!
    </p>
  </div>

  <div class="contenido">

  <p class="instruccion">Recorré el álbum completo, año por año, y no te olvides de llegar hasta la última figurita ⭐</p>

  <div class="grilla" id="grilla">
    <!-- Las figuritas se generan con JS -->
  </div>

  <p class="pie">
    <span class="te-amo">¡TE AMO MUCHO LUCCA!</span>
    <span class="firma">Papá ❤️</span>
  </p>

  </div>

</div>

<div class="overlay" id="overlay">
  <div class="ficha" id="ficha"></div>
</div>

<script>
  // ---------------------------------------------------------------
  // CONTENIDO DEL ÁLBUM
  // Para completar: poner la ruta del video correspondiente a cada
  // año. Dejar en "" lo que todavía no se tenga.
  //
  //  video: ruta o URL a un video corto (mp4) grabado por papá
  //         contando esa parte de la historia de Lucca
  // ---------------------------------------------------------------

  const anios = [
    { anio:0, edad:"Lucca", foto:"fotos/anio0.jpeg", video:"videos/anio0.mp4" },
    { anio:1, edad:"1 año",          foto:"fotos/anio1.jpeg", video:"videos/anio1.mp4" },
    { anio:2, edad:"2 años",         foto:"fotos/anio2.jpeg", video:"videos/anio2.mp4" },
    { anio:3, edad:"3 años",         foto:"fotos/anio3.jpeg", video:"videos/anio3.mp4" },
    { anio:4, edad:"4 años",         foto:"fotos/anio4.jpeg", video:"videos/anio4.mp4" },
    { anio:5, edad:"5 años",         foto:"fotos/anio5.jpeg", video:"videos/anio5.mp4" },
    { anio:6, edad:"6 años",         foto:"fotos/anio6.jpeg", video:"videos/anio6.mp4" },
    { anio:7, edad:"7 años",         foto:"fotos/anio7.jpeg", video:"videos/anio7.mp4" },
  ];

  // Mensaje y video de cierre (hoy, 8 años)
  const final = {
    edad:"hoy, 8 años",
    video:"videos/anio8.mp4",     // ruta o URL al video final grabado por papá
    mensaje:"¡Feliz cumpleaños, Lucca!"
  };

  // ---------------------------------------------------------------

  const grilla = document.getElementById('grilla');
  const overlay = document.getElementById('overlay');
  const ficha = document.getElementById('ficha');

  anios.forEach(item => {
    const div = document.createElement('div');
    const tieneFoto = !!item.foto;
    div.className = 'figurita' + (tieneFoto ? '' : ' placeholder');

    const fondoHTML = tieneFoto
      ? `<img class="fondo-foto" src="${item.foto}" alt="Lucca - ${item.edad}">`
      : `<div class="numero-fondo">${item.anio}</div>`;

    const degradadoHTML = tieneFoto ? `<div class="degradado"></div>` : '';

    div.innerHTML = `
      <span class="estrellita">★</span>
      ${fondoHTML}
      ${degradadoHTML}
      <div class="pie-figurita">
        <span class="pie-edad">${item.edad}</span>
      </div>
    `;
    div.addEventListener('click', () => {
      div.classList.add('no-brillo');
      abrirFicha(item);
    });
    grilla.appendChild(div);
  });

  // Figurita final
  const divFinal = document.createElement('div');
  divFinal.className = 'figurita final';
  divFinal.innerHTML = `
    <span class="deco globo1">🎈</span>
    <span class="deco globo2">🎈</span>
    <span class="deco globo3">🎈</span>
    <span class="deco globo4">🎈</span>
    <span class="deco pelota1">⚽</span>
    <span class="deco pelota2">⚽</span>
    <span class="deco pelota3">⚽</span>
    <span class="deco pelota4">⚽</span>
    <span class="deco avion">✈️</span>
    <span class="numero-final">8</span>
    <span class="pie-edad">años</span>
  `;
  divFinal.addEventListener('click', () => {
    divFinal.classList.add('no-brillo');
    abrirFinal();
  });
  grilla.appendChild(divFinal);

  function abrirFicha(item){
    let videoHTML = `
      <div class="marco-foto">
        <span class="icono-camara">🎬</span>
        Acá va el video de cuando Lucca tenía ${item.edad}
      </div>`;

    if(item.video){
      videoHTML = `<div class="marco-foto"><video controls autoplay playsinline src="${item.video}"></video></div>`;
    }

    ficha.innerHTML = `
      <button class="cerrar cerrar-flotante" id="cerrarBtn">✕</button>
      <div class="ficha-cuerpo ficha-cuerpo-video">
        ${videoHTML}
      </div>
    `;

    document.getElementById('cerrarBtn').addEventListener('click', cerrarFicha);
    overlay.classList.add('activo');
  }

  function abrirFinal(){
    let videoHTML = `
      <div class="video-final">
        <span class="icono-camara">🎬</span>
        Acá va el video de papá para Lucca
      </div>`;

    if(final.video){
      videoHTML = `<div class="video-final"><video controls autoplay playsinline src="${final.video}"></video></div>`;
    }

    ficha.innerHTML = `
      <button class="cerrar cerrar-flotante" id="cerrarBtn">✕</button>
      <div class="ficha-cuerpo ficha-cuerpo-video">
        ${videoHTML}
        <h2 class="mensaje-final">${final.mensaje}</h2>
      </div>
    `;

    document.getElementById('cerrarBtn').addEventListener('click', cerrarFicha);
    overlay.classList.add('activo');
  }

  function cerrarFicha(){
    overlay.classList.remove('activo');
  }

  overlay.addEventListener('click', (e) => {
    if(e.target === overlay) cerrarFicha();
  });
</script>

</body>
</html>
